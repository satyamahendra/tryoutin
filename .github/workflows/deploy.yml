name: Build & Deploy

on:
    release:
        types:
            - published

permissions:
    contents: read
    packages: write

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and Push Docker Image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  push: true
                  tags: |
                      ghcr.io/satyamahendra/svtyv:latest
                      ghcr.io/satyamahendra/svtyv:${{ github.sha }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  # Only client-exposed (NEXT_PUBLIC_*) vars go here —
                  # they get baked into the JS bundle at `next build` time.
                  build-args: |
                      NEXT_PUBLIC_MIDTRANS_CLIENT_KEY=${{ secrets.NEXT_PUBLIC_MIDTRANS_CLIENT_KEY }}
                      NEXT_PUBLIC_MIDTRANS_URL=${{ secrets.NEXT_PUBLIC_MIDTRANS_URL }}

    deploy:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Deploy Containers to VPS via SSH
              uses: appleboy/ssh-action@v1.2.2
              with:
                  host: ${{ secrets.SSH_HOST }}
                  username: ${{ secrets.SSH_USERNAME }}
                  key: ${{ secrets.SSH_KEY }}
                  envs: >-
                      GITHUB_TOKEN,GITHUB_ACTOR,
                      POSTGRES_DB,POSTGRES_USER,POSTGRES_PASSWORD,
                      DATABASE_URL,NODE_ENV,
                      BETTER_AUTH_SECRET,BETTER_AUTH_URL,
                      GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,
                      MIDTRANS_SERVER_KEY,
                      WHITELISTED_EMAILS
                  script: |
                      # 1. Log into GHCR
                      echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

                      # 2. Ensure isolated Docker network exists
                      docker network create svtyv-net || true

                      # 3. Pull the updated app image
                      docker pull ghcr.io/satyamahendra/svtyv:latest

                      # 4. Stop and remove old instances safely
                      docker stop svtyv-app svtyv-db || true
                      docker rm svtyv-app svtyv-db || true

                      # 5. Spin up Postgres with credentials passed directly.
                      #    Bound to 127.0.0.1 only — not reachable from
                      #    outside the VPS. Drop the -p line entirely if you
                      #    never need to connect to it from your own machine.
                      docker run -d \
                      --name svtyv-db \
                      --network svtyv-net \
                      --restart unless-stopped \
                      -p 127.0.0.1:5433:5432 \
                      -v postgres_data:/var/lib/postgresql/data \
                      -e POSTGRES_USER="$POSTGRES_USER" \
                      -e POSTGRES_PASSWORD="$POSTGRES_PASSWORD" \
                      -e POSTGRES_DB="$POSTGRES_DB" \
                      postgres:17-alpine

                      # Give Postgres time to initialize
                      sleep 10

                      # 6. Spin up the app, passing only the runtime vars it needs
                      docker run -d \
                      --name svtyv-app \
                      --network svtyv-net \
                      --restart unless-stopped \
                      -p 3001:3000 \
                      -e DATABASE_URL="$DATABASE_URL" \
                      -e NODE_ENV="$NODE_ENV" \
                      -e BETTER_AUTH_SECRET="$BETTER_AUTH_SECRET" \
                      -e BETTER_AUTH_URL="$BETTER_AUTH_URL" \
                      -e GOOGLE_CLIENT_ID="$GOOGLE_CLIENT_ID" \
                      -e GOOGLE_CLIENT_SECRET="$GOOGLE_CLIENT_SECRET" \
                      -e MIDTRANS_SERVER_KEY="$MIDTRANS_SERVER_KEY" \
                      -e WHITELISTED_EMAILS="$WHITELISTED_EMAILS" \
                      ghcr.io/satyamahendra/svtyv:latest \
                      sh -c "npx prisma migrate deploy && node server.js"

                      # 7. Clean up old dangling images
                      docker image prune -f
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  GITHUB_ACTOR: ${{ github.actor }}
                  POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
                  POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
                  POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
                  DATABASE_URL: ${{ secrets.DATABASE_URL }}
                  NODE_ENV: ${{ secrets.NODE_ENV }}
                  BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
                  BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
                  GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
                  GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
                  MIDTRANS_SERVER_KEY: ${{ secrets.MIDTRANS_SERVER_KEY }}
                  WHITELISTED_EMAILS: ${{ secrets.WHITELISTED_EMAILS }}
