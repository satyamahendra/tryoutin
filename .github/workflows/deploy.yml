name: Build & Deploy

on:
    release:
        types:
            - published

permissions:
    contents: read
    packages: write

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and Push Docker Image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  push: true
                  tags: |
                      ghcr.io/satyamahendra/svtyv:latest
                      ghcr.io/satyamahendra/svtyv:${{ github.sha }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    deploy:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Write .env to VPS
              uses: appleboy/ssh-action@v1.2.2
              with:
                  host: ${{ secrets.SSH_HOST }}
                  username: ${{ secrets.SSH_USERNAME }}
                  key: ${{ secrets.SSH_KEY }}
                  envs: ENV_FILE
                  script: |
                      mkdir -p /home/satya/apps/svtyv
                      cat > /home/satya/apps/svtyv/.env << 'EOF'
                      $ENV_FILE
                      EOF
              env:
                  ENV_FILE: ${{ secrets.ENV }}

            - name: Deploy to VPS
              uses: appleboy/ssh-action@v1.2.2
              with:
                  host: ${{ secrets.SSH_HOST }}
                  username: ${{ secrets.SSH_USERNAME }}
                  key: ${{ secrets.SSH_KEY }}
                  envs: GHCR_PAT,GHCR_USER,IMAGE_TAG
                  script: |
                      echo "$GHCR_PAT" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
                      cd /home/satya/apps/svtyv
                      export IMAGE_TAG="$IMAGE_TAG"
                      docker compose pull
                      docker compose up -d
                      docker image prune -af
              env:
                  GHCR_PAT: ${{ secrets.GHCR_PAT }}
                  GHCR_USER: ${{ github.actor }}
                  IMAGE_TAG: ${{ github.sha }}
